<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Promotions - Sonal, Zach, Luke</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #FFFFFF;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #root {
            width: 1280px;
            height: 720px;
            transform-origin: center center;
            flex-shrink: 0;
            position: absolute;
        }

        .canvas-bg {
            width: 1280px;
            height: 720px;
            background-color: #FFFFFF;
            background-image: radial-gradient(#EAEAEA 1.5px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column; 
            border: 6px solid #FFDD33;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* --- Rainbow Pulse Tag Effect --- */
        @keyframes rainbow-pulse {
            0% { box-shadow: 0 0 0 0px #F24822; }
            33% { box-shadow: 0 0 0 8px #FFDD33; }
            66% { box-shadow: 0 0 0 12px #47D1C4; }
            100% { box-shadow: 0 0 0 0px #F24822; }
        }

        .alert-tag-glow {
            animation: rainbow-pulse 3s infinite;
        }

        /* --- Portrait Border Effect --- */
        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .animated-border-container {
            position: relative;
            padding: 8px;
            background: #1C1C1E;
            border-radius: 3.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .animated-border-container::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                #FFDD33, #47D1C4, #867AFF, #F24822, #FFDD33
            );
            animation: rotate-gradient 4s linear infinite;
        }

        .hero-inner {
            position: relative;
            z-index: 10;
            background: white;
            border-radius: 3rem;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border: 4px solid #1C1C1E;
        }

        .miro-highlight {
            background-color: #FFDD33;
            padding: 0 16px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 0px #1C1C1E;
        }

        /* Confetti Pieces */
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            top: -20px;
            will-change: transform;
        }
        .confetti-inner {
            width: 100%;
            height: 100%;
            border-radius: 2px;
        }
        @keyframes fall {
            0% { transform: translate3d(var(--x-start), -20px, 0) rotateX(0deg) rotateY(0deg); }
            100% { transform: translate3d(var(--x-end), 740px, 0) rotateX(720deg) rotateY(360deg); }
        }
        .animate-fall {
            animation: fall var(--duration) linear forwards;
            animation-delay: var(--delay);
        }

        @keyframes float-sparkle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-10px) scale(1.2); opacity: 0.5; }
        }
        .sparkle-particle {
            animation: float-sparkle 2s ease-in-out infinite;
        }

        .profile-name-tag {
            background: #1C1C1E;
            color: #FFFFFF;
            padding: 6px 20px;
            border-radius: 1rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 14px;
            z-index: 50;
            margin-top: -20px;
            box-shadow: 6px 6px 0px #FFDD33;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ARCHITECT_DATA = [
            { name: "Sonal Thaper", url: "https://ca.slack-edge.com/T028Q5EBK-U03N5DDQ03D-30369874462f-512", shadow: "#47D1C4" },
            { name: "Zach Hill", url: "https://ca.slack-edge.com/T028Q5EBK-U06DZDCCEBU-1715dcee8829-512", shadow: "#867AFF" },
            { name: "Luke Jones", url: "https://ca.slack-edge.com/T028Q5EBK-U07HFPTHUKW-d7539e9ec4e7-512", shadow: "#FFDD33" }
        ];

        const useAutoScaler = () => {
            useEffect(() => {
                const scaler = () => {
                    const root = document.getElementById('root');
                    if (root) {
                        const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                        root.style.transform = `scale(${scale})`;
                    }
                };
                window.addEventListener('resize', scaler);
                scaler();
                return () => window.removeEventListener('resize', scaler);
            }, []);
        };

        const ConfettiLayer = ({ isForeground, trigger }) => {
            const [pieces, setPieces] = useState([]);
            const pieceIdCounter = useRef(0);

            useEffect(() => {
                if (trigger === 0) return;
                const colors = ['#FFDD33', '#47D1C4', '#867AFF', '#F24822', '#1C1C1E'];
                const totalCount = isForeground ? 120 : 180; 
                const newBatch = Array.from({ length: totalCount }).map(() => {
                    const xStart = Math.random() * 1280;
                    const xEnd = xStart + (Math.random() * 600 - 300);
                    const duration = 2.5 + Math.random() * 3.5;
                    const delay = Math.random() * 3;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    return {
                        id: pieceIdCounter.current++,
                        color,
                        style: {
                            '--x-start': `${xStart}px`,
                            '--x-end': `${xEnd}px`,
                            '--duration': `${duration}s`,
                            '--delay': `${delay}s`,
                            left: 0,
                        }
                    };
                });
                setPieces(newBatch);
                const timer = setTimeout(() => setPieces([]), 10000); 
                return () => clearTimeout(timer);
            }, [isForeground, trigger]);

            return (
                <div className={`absolute inset-0 pointer-events-none overflow-hidden ${isForeground ? 'z-[100]' : 'z-[5]'}`}>
                    {pieces.map(p => (
                        <div key={`${trigger}-${p.id}`} className="confetti-piece animate-fall" style={p.style}>
                            <div className="confetti-inner" style={{ backgroundColor: p.color }} />
                        </div>
                    ))}
                </div>
            );
        };

        const Sparkle = ({ style }) => (
            <div className="absolute sparkle-particle pointer-events-none text-xl" style={style}>✨</div>
        );

        const ProfileCard = ({ name, imageUrl, shadowColor, delay }) => (
            <div className="flex flex-col items-center group" style={{ animation: `fadeIn 0.8s ease-out ${delay}s both` }}>
                <div className="animated-border-container w-[280px] h-[280px]" style={{ boxShadow: `16px 16px 0px ${shadowColor}` }}>
                    <div className="hero-inner">
                        <img 
                            src={imageUrl} 
                            alt={name} 
                            className="w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 group-hover:scale-110 transition-all duration-500"
                        />
                    </div>
                </div>
                <div className="profile-name-tag">
                    {name}
                </div>
            </div>
        );

        const App = () => {
            useAutoScaler();
            const [trigger, setTrigger] = useState(0);

            useEffect(() => {
                setTrigger(prev => prev + 1);
            }, []);

            const handleCanvasClick = () => {
                setTrigger(prev => prev + 1);
            };

            return (
                <div className="canvas-bg select-none" onClick={handleCanvasClick}>
                    <ConfettiLayer isForeground={false} trigger={trigger} />

                    {/* Header Section */}
                    <div className="h-[220px] flex flex-col items-center justify-center pt-8 relative z-20 pointer-events-none">
                        <div className="relative w-fit mb-6">
                            <div className="bg-[#F24822] text-white px-8 py-2.5 text-[16px] font-black uppercase tracking-[0.4em] rounded-full shadow-[6px_6px_0px_#1C1C1E] flex items-center gap-3 alert-tag-glow relative z-10">
                                PROMOTION ANNOUNCEMENT
                            </div>
                            <Sparkle style={{ top: '-20px', left: '-10px', animationDelay: '0s' }} />
                            <Sparkle style={{ bottom: '-10px', right: '-15px', animationDelay: '0.5s' }} />
                        </div>
                        
                        <h1 className="text-[72px] font-[900] italic uppercase leading-none text-[#1C1C1E] tracking-tighter text-center">
                            MEET OUR <span className="miro-highlight">NEWEST</span> ARCHITECTS
                        </h1>
                        <p className="text-[18px] font-black text-[#1C1C1E]/40 uppercase tracking-[0.3em] mt-4">
                            Associate Innovation Architects • FY27
                        </p>
                    </div>

                    {/* Profiles Row */}
                    <div className="flex-1 px-12 flex justify-center items-center gap-12 relative z-30 pointer-events-none">
                        {ARCHITECT_DATA.map((arch, idx) => (
                            <div className="pointer-events-auto" key={arch.name}>
                                <ProfileCard 
                                    name={arch.name} 
                                    imageUrl={arch.url} 
                                    shadowColor={arch.shadow}
                                    delay={0.2 * (idx + 1)}
                                />
                            </div>
                        ))}
                    </div>

                    <div className="h-[60px]" />

                    <ConfettiLayer isForeground={true} trigger={trigger} />

                    {/* Background Decor */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[450px] font-[900] italic uppercase text-[#1C1C1E]/[0.01] tracking-tighter pointer-events-none">
                        ARCHITECTS
                    </div>
                    
                    <div className="absolute bottom-6 left-12 right-12 flex justify-between opacity-20 pointer-events-none">
                        <span className="text-[11px] font-black uppercase tracking-[0.4em] italic text-[#1C1C1E]">
                            Growth - Excellence - Efficiency
                        </span>
                        <span className="text-[11px] font-black uppercase tracking-[0.4em] italic text-[#1C1C1E]">
                            FY27 Internal Announcement
                        </span>
                    </div>

                    <style>{`
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(30px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
