<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro MOST Time Tracking Policy</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #F4F4F4;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #root-container {
            width: 1280px;
            height: 720px;
            transform-origin: center center;
            flex-shrink: 0;
            position: relative;
            background-color: white;
        }

        .canvas-bg {
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            background-image: radial-gradient(#EAEAEA 1.5px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column; 
            border: 4px solid #FFDD33;
            position: relative;
            overflow: hidden;
        }

        .miro-highlight {
            background-color: #FFDD33;
            padding: 0 12px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 4px 4px 0px #1C1C1E;
        }

        .card-container {
            background-color: #FFFFFF;
            border: 4px solid #1C1C1E;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.1s steps(2);
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .card-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 0px 0px #1C1C1E;
        }

        .section-tag {
            background-color: #1C1C1E;
            color: #FFDD33;
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 11px;
            width: fit-content;
        }

        .view-transition {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sharp-text {
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        
        .policy-item-text {
            font-size: 14.5px;
            line-height: 1.3;
            font-weight: 700;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1C1C1E20; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root-container">
        <div id="root" style="width: 100%; height: 100%;"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const useAutoScaler = () => {
            useEffect(() => {
                const scaler = () => {
                    const container = document.getElementById('root-container');
                    if (container) {
                        const scale = Math.min(window.innerWidth / 1300, window.innerHeight / 740);
                        container.style.transform = `scale(${scale})`;
                    }
                };
                window.addEventListener('resize', scaler);
                scaler();
                return () => window.removeEventListener('resize', scaler);
            }, []);
        };

        const Icon = ({ type, color = "#1C1C1E", size = "32" }) => {
            const icons = {
                allocation: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" />
                    </svg>
                ),
                counting: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                ),
                rules: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                ),
                purchase: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                ),
                back: (
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                ),
                check: (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                ),
                cross: (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                )
            };
            return icons[type] || null;
        };

        const OverviewCard = ({ data, onSelect }) => (
            <div 
                className="card-container rounded-[2rem] p-6 flex flex-col h-full bg-white shadow-[2px_2px_0px_#1C1C1E]"
                onClick={() => onSelect(data)}
            >
                <div className="flex justify-between items-start mb-4">
                    <div className="p-3 rounded-xl border-2 border-[#1C1C1E] shadow-[3px_3px_0px_#1C1C1E]" style={{ backgroundColor: data.color }}>
                        <Icon type={data.id} size="28" />
                    </div>
                    <div className="section-tag">{data.shortLabel}</div>
                </div>
                
                <h2 className="text-2xl font-[900] italic uppercase leading-tight tracking-tighter mb-3 text-[#1C1C1E] sharp-text">
                    {data.title}
                </h2>
                
                <div className="flex-1 space-y-2">
                    {data.highlights.map((h, i) => (
                        <div key={i} className="flex gap-2 items-start">
                            <div className="w-1.5 h-1.5 rounded-full bg-[#1C1C1E] mt-1.5 shrink-0"></div>
                            <span className="text-[14px] font-bold text-[#1C1C1E]/80 leading-tight">{h}</span>
                        </div>
                    ))}
                </div>

                <div className="mt-4 pt-4 border-t-2 border-[#1C1C1E]/5 flex items-center justify-between group">
                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-[#1C1C1E]/30">Learn More</span>
                    <div className="w-8 h-8 rounded-full border-2 border-[#1C1C1E] flex items-center justify-center group-hover:bg-[#1C1C1E] group-hover:text-white transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
        );

        const DetailView = ({ section, onBack }) => (
            <div className="view-transition flex-1 flex flex-col px-10 pb-6 overflow-hidden">
                <div className="mb-4 flex items-center gap-4 shrink-0">
                    <button 
                        onClick={onBack}
                        className="flex items-center gap-2 bg-[#1C1C1E] text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-[#1C1C1E]/80 transition-all shadow-[3px_3px_0px_#FFDD33]"
                    >
                        <Icon type="back" color="white" size="14" />
                        BACK TO DASHBOARD
                    </button>
                    <div className="h-[1px] flex-1 bg-[#1C1C1E]/10 rounded-full"></div>
                </div>

                <div className="grid grid-cols-12 gap-5 flex-1 overflow-hidden">
                    {/* Left Column - Hero Summary */}
                    <div className="col-span-4 flex flex-col overflow-hidden">
                        <div className="card-container rounded-[1.5rem] p-8 flex-1 bg-white flex flex-col justify-center items-center text-center" style={{ borderColor: section.color }}>
                            <div className="p-6 rounded-2xl border-2 border-[#1C1C1E] shadow-[4px_4px_0px_#1C1C1E] w-fit mb-6" style={{ backgroundColor: section.color }}>
                                <Icon type={section.id} size="48" />
                            </div>
                            <h2 className="text-4xl font-[900] italic uppercase leading-tight tracking-tighter text-[#1C1C1E] mb-2">{section.title}</h2>
                            <p className="text-lg font-black text-[#1C1C1E]/40 italic uppercase tracking-widest">{section.shortLabel}</p>
                            
                            <div className="mt-8 space-y-4 w-full">
                                {section.highlights.map((h, i) => (
                                    <div key={i} className="bg-[#1C1C1E]/5 p-3 rounded-xl border border-[#1C1C1E]/10">
                                        <p className="text-sm font-bold text-[#1C1C1E] tracking-tight italic uppercase">{h}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Right Column - Deep Dive Content */}
                    <div className="col-span-8 flex flex-col gap-4 overflow-hidden">
                        <div className="card-container rounded-[1.5rem] p-8 flex-1 bg-white border-2 border-[#1C1C1E] flex flex-col overflow-hidden">
                            <h3 className="text-[11px] font-black uppercase tracking-widest text-[#1C1C1E]/40 mb-5 shrink-0">{section.contentTitle}</h3>
                            
                            <div className="grid grid-cols-2 gap-8 flex-1 overflow-hidden">
                                {section.listGroups.map((group, idx) => (
                                    <div key={idx} className="flex flex-col overflow-hidden">
                                        <div className="flex items-center gap-2 mb-4 shrink-0">
                                            <div className={`w-3 h-3 rounded-sm ${group.isPositive ? 'bg-[#47D1C4]' : 'bg-[#F24822]'}`}></div>
                                            <h4 className="text-[13px] font-black uppercase tracking-tighter text-[#1C1C1E]">{group.label}</h4>
                                        </div>
                                        <div className="space-y-3 overflow-y-auto pr-1 custom-scrollbar">
                                            {group.items.map((item, i) => (
                                                <div key={i} className="flex gap-4 items-center p-3 rounded-xl border border-[#1C1C1E]/5 hover:bg-[#F9F9F9] transition-colors">
                                                    <div className={`shrink-0 w-6 h-6 rounded-full flex items-center justify-center ${group.isPositive ? 'text-[#47D1C4] bg-[#47D1C4]/10' : 'text-[#F24822] bg-[#F24822]/10'}`}>
                                                        <Icon type={group.isPositive ? 'check' : 'cross'} size="14" />
                                                    </div>
                                                    <span className="policy-item-text text-[#1C1C1E]">{item}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {section.footerNote && (
                                <div className="mt-6 p-4 bg-[#FFDD33] rounded-xl border-2 border-[#1C1C1E] flex gap-4 items-center shadow-[4px_4px_0px_#1C1C1E] shrink-0">
                                    <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center border-2 border-[#1C1C1E] shrink-0">
                                        <Icon type="rules" size="20" />
                                    </div>
                                    <p className="text-[14px] font-black uppercase tracking-tight text-[#1C1C1E] leading-tight italic">
                                        {section.footerNote}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            useAutoScaler();
            const [selectedSection, setSelectedSection] = useState(null);

            const sections = [
                {
                    id: 'allocation',
                    title: "Quarterly Allocation",
                    shortLabel: "60 Hours / Qtr",
                    color: "#FFDD33",
                    highlights: [
                        "60 hours allocated per quarter",
                        "No rollover of unused hours",
                        "February reset (FY2027 Q1)"
                    ],
                    contentTitle: "Fiscal Calendar & Reset Logic",
                    listGroups: [
                        {
                            label: "Fiscal Quarters (2026)",
                            isPositive: true,
                            items: [
                                "Q1: February | March | April",
                                "Q2: May | June | July",
                                "Q3: August | September | October",
                                "Q4: November | December | January"
                            ]
                        },
                        {
                            label: "Reset Policies",
                            isPositive: false,
                            items: [
                                "Hours do NOT roll over to next Q",
                                "Bank of hours resets on 1st of month",
                                "Strict end-of-quarter expiration",
                                "Allocation is per Miro account"
                            ]
                        }
                    ],
                    footerNote: "QUARTERLY ALLOCATION RESETS AT START OF FEBRUARY, MAY, AUGUST, AND NOVEMBER."
                },
                {
                    id: 'counting',
                    title: "How Time is Counted",
                    shortLabel: "Expert Capacity",
                    color: "#47D1C4",
                    highlights: [
                        "Workshops & working sessions",
                        "Preparation & documentation",
                        "Configuration & migrations"
                    ],
                    contentTitle: "Consumption Definitions",
                    listGroups: [
                        {
                            label: "Counted Activities",
                            isPositive: true,
                            items: ["Configurations & Migrations", "Workshops & Training delivery", "Behind-the-Scenes Analysis", "Sync rules & Mapping setup", "No-show meetings (<24h notice)"]
                        },
                        {
                            label: "Not Counted",
                            isPositive: false,
                            items: ["Internal Miro Admin Work", "Sales or Pre-sales Calls", "Meeting scheduling overhead", "General Miro platform updates"]
                        }
                    ],
                    footerNote: "TRACKING REFLECTS TOTAL EXPERT CAPACITY REQUIRED TO DELIVER OUTCOMES."
                },
                {
                    id: 'rules',
                    title: "Consumption Rules",
                    shortLabel: "Pacing & Limits",
                    color: "#867AFF",
                    highlights: [
                        "Minimum 4 hours per request",
                        "Maximum 15 hours per week",
                        "No overages on standard bank"
                    ],
                    contentTitle: "Usage Guidelines",
                    listGroups: [
                        {
                            label: "Standard Rules",
                            isPositive: true,
                            items: ["Min 4h per engagement request", "Max 15h weekly pacing limit", "Up to 3 concurrent workstreams", "Monthly usage summaries"]
                        },
                        {
                            label: "Capacity Caps",
                            isPositive: false,
                            items: ["No automatic hour overages", "Next-quarter deferral for excess", "Strict 60h quarterly limit", "No manual credit transfers"]
                        }
                    ],
                    footerNote: "WEEKLY PACING ENSURES EQUITABLE RESOURCE ACCESS AND SUSTAINABLE PROGRESS."
                },
                {
                    id: 'purchase',
                    title: "Need More Hours?",
                    shortLabel: "Top-Up Blocks",
                    color: "#CE70FC",
                    highlights: [
                        "Purchase 20-Hour blocks",
                        "Maximum 2 blocks per year",
                        "Requires 80% usage threshold"
                    ],
                    contentTitle: "Additional Capacity Policy",
                    listGroups: [
                        {
                            label: "Purchase Criteria",
                            isPositive: true,
                            items: ["Projected 80% usage of base", "Current status in good standing", "Defined roadmap for extra hours", "Standardized contract addendum"]
                        },
                        {
                            label: "Top-Up Constraints",
                            isPositive: false,
                            items: ["Maximum 2 blocks per 12-months", "Non-refundable once purchased", "Same expiration/reset rules", "No bulk multi-quarter carry"]
                        }
                    ],
                    footerNote: "PLEASE REACH OUT TO YOUR CSM OR AE IF YOU REQUIRE ADDITIONAL HOURS."
                }
            ];

            return (
                <div className="canvas-bg select-none">
                    <div className="h-[105px] px-10 flex items-center justify-between relative z-20 mt-3 shrink-0">
                        <div className="sharp-text">
                            <div className="flex items-center gap-2 mb-1">
                                <div className="bg-[#1C1C1E] text-[#FFDD33] px-2 py-0.5 rounded text-[10px] font-black tracking-widest uppercase">Miro Professional Services</div>
                                <div className="w-8 h-[1px] bg-[#1C1C1E]/10"></div>
                            </div>
                            <h1 className="text-[44px] font-[900] italic uppercase leading-[0.9] tracking-tighter text-[#1C1C1E]">
                                UNDERSTANDING YOUR <span className="miro-highlight">MOST</span> SUBSCRIPTION HOURS
                            </h1>
                        </div>
                    </div>

                    {!selectedSection ? (
                        <div className="view-transition flex-1 px-10 pb-10 grid grid-cols-4 gap-6 overflow-hidden">
                            {sections.map((s) => (
                                <OverviewCard key={s.id} data={s} onSelect={setSelectedSection} />
                            ))}
                        </div>
                    ) : (
                        <DetailView section={selectedSection} onBack={() => setSelectedSection(null)} />
                    )}

                    <div className="h-[40px] px-10 flex justify-between items-center bg-white/50 border-t border-[#1C1C1E]/5 mb-1 shrink-0">
                        <div className="flex gap-6 items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#FFDD33]"></div>
                                <span className="text-[9px] font-black uppercase text-[#1C1C1E]/60 tracking-widest leading-none italic">Allocation</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#47D1C4]"></div>
                                <span className="text-[9px] font-black uppercase text-[#1C1C1E]/60 tracking-widest leading-none italic">Consumption</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#867AFF]"></div>
                                <span className="text-[9px] font-black uppercase text-[#1C1C1E]/60 tracking-widest leading-none italic">Execution</span>
                            </div>
                        </div>
                        <div className="flex gap-3 items-center">
                             <div className="text-[9px] font-black text-[#1C1C1E]/20 tracking-tighter uppercase italic">Miro Optimization Services & Training • v2026.7</div>
                             <div className="w-[1px] h-3 bg-[#1C1C1E]/10"></div>
                             <svg width="32" height="10" viewBox="0 0 100 32" fill="#1C1C1E" className="opacity-10"><path d="M12 4h4v24h-4zM24 4h4v24h-4zM36 4h4v24h-4zM48 4h4v24h-4z" /></svg>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
